name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write # required for npm provenance

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      # npm Trusted Publishing (OIDC) requires npm >= 11.5.1; Node 22 ships an
      # older npm. Upgrade so `npm publish` can authenticate via id-token.
      # Requires Trusted Publishing to be configured for @nugehs/gate on
      # npmjs.com (repo nugehs/gate, workflow release.yml).
      - name: Update npm for OIDC trusted publishing
        run: npm install -g npm@latest

      - name: Quality gate
        run: npm run ci

      - name: Verify tag matches package version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$PKG" ]; then
            echo "Tag v$TAG does not match package.json version $PKG" >&2
            exit 1
          fi

      - name: Publish
        run: npm publish

  github-release:
    name: Create GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write # required to create the release

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Extract release notes from CHANGELOG.md
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v ver="$VERSION" '
            /^## / { if (found) exit; if (index($2, "[" ver "]") == 1 || $2 == "v" ver) { found = 1; next } }
            found { print }
          ' CHANGELOG.md > "$RUNNER_TEMP/release-notes.md"
          if [ ! -s "$RUNNER_TEMP/release-notes.md" ]; then
            echo "No CHANGELOG.md section found for v$VERSION; using fallback notes." >&2
            echo "Release $GITHUB_REF_NAME. See CHANGELOG.md for details." > "$RUNNER_TEMP/release-notes.md"
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes-file "$RUNNER_TEMP/release-notes.md" \
            --verify-tag

  publish-mcp:
    name: Publish to MCP Registry
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for MCP Registry GitHub OIDC login

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/').tar.gz" | tar xz mcp-publisher

      - name: Log in to the MCP Registry (GitHub OIDC)
        run: ./mcp-publisher login github-oidc

      - name: Publish server.json
        run: ./mcp-publisher publish
